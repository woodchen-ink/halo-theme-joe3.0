<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <th:block th:fragment="key_css">
    <style th:inline="text">
      html body {
          --waline-avatar-size: 2.25rem;
          --waline-m-avatar-size: calc(var(--waline-avatar-size) * 9 / 13);
          --waline-theme-color:[[${theme.config.basic.mode_color_light == '#fb6c28' ? '#4B669A' : (theme.config.basic.mode_color_light ?: '#4B669A')}]];
          --waline-active-color: [[${theme.config.basic.mode_color_light == '#fb6c28' ? '#4B669A' : (theme.config.basic.mode_color_light ?: '#4B669A')}]];

          --theme: [[${theme.config.basic.mode_color_light == '#fb6c28' ? '#4B669A' : (theme.config.basic.mode_color_light ?: '#4B669A')}]];
          --wave-color: [[${theme.config.beauty.light_color}?:'#fff']];
          --loading-bar:  [[${theme.config.theme.loading_bar_color == '#fb6c28' ? 'var(--theme)' : (theme.config.theme.loading_bar_color ?: 'var(--theme)')}]];
          --img-max-width: 100%;
          font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", Arial, "sans-serif";
          --halo-comment-widget-base-font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", Arial, "sans-serif";
          --halo-search-widget-base-font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", Arial, "sans-serif";
          --halo-comment-widget-base-color: var(--main);
          --halo-comment-widget-base-info-color:var(--routine);



      }
      html[data-mode='dark'] body {

          --waline-theme-color:[[${theme.config.basic.mode_color_dark == '#9999ff' ? '#7B90BF' : (theme.config.basic.mode_color_dark ?: '#7B90BF')}]];
          --waline-active-color: [[${theme.config.basic.mode_color_dark == '#9999ff' ? '#7B90BF' : (theme.config.basic.mode_color_dark ?: '#7B90BF')}]];
          --theme: [[${theme.config.basic.mode_color_dark == '#9999ff' ? '#7B90BF' : (theme.config.basic.mode_color_dark ?: '#7B90BF')}]];
          --wave-color: [[${theme.config.beauty.dark_color}?:'#fff']];
          --loading-bar: [[${theme.config.theme.loading_bar_color == '#fb6c28' ? 'var(--theme)' : (theme.config.theme.loading_bar_color ?: 'var(--theme)')}]];
          --halo-search-widget-color-modal-layer: rgba(0, 0, 0, 0.8);
          --halo-search-widget-color-modal-content-bg: #181D22;
          --halo-search-widget-color-form-input: #EEF3F8;
          --halo-search-widget-color-form-input-placeholder: #95A0AE;
          --halo-search-widget-color-form-input-bg: #181D22;
          --halo-search-widget-color-form-divider: #3A4558;
          --halo-search-widget-color-result-item-bg: #181D22;
          --halo-search-widget-color-result-item-hover-bg: #253042;
          --halo-search-widget-color-result-item-title: #EEF3F8;
          --halo-search-widget-color-result-item-content: #95A0AE;
          --halo-search-widget-color-command-kbd-item: #95A0AE;
          --halo-search-widget-color-command-kbd-border: #3A4558;
          --halo-search-widget-color-result-empty: #95A0AE;
          --halo-comment-widget-component-form-input-bg-color: #181D22;
          --halo-comment-widget-component-form-input-color: #EEF3F8;
          --halo-comment-widget-component-form-input-border-color: #3A4558;
          --halo-comment-widget-component-form-input-border-color-focus: #7B90BF;
          --halo-comment-widget-component-form-input-box-shadow-focus: 0 0 0 0.15em #2A367A;
          --halo-comment-widget-component-form-button-login-bg-color: #253042;
          --halo-comment-widget-component-form-button-login-bg-color-hover: #1D2430;
          --halo-comment-widget-component-form-button-login-border-color: #3A4558;
          --halo-comment-widget-component-form-button-submit-border-color: #3A4558;
          --halo-comment-widget-component-form-button-submit-border-color-hover: #7B90BF;
          --halo-comment-widget-component-form-button-emoji-color: #D5DCE5;

          --halo-comment-widget-component-comment-item-action-bg-color-hover: #253042;
          --halo-comment-widget-component-comment-item-action-color: #95A0AE;
          --halo-comment-widget-component-comment-item-action-color-hover: #D5DCE5;

          --halo-comment-widget-component-pagination-button-bg-color-hover: #253042;
          --halo-comment-widget-component-pagination-button-bg-color-active: #253042;
          --halo-comment-widget-component-pagination-button-border-color-active: #3A4558;

          --halo-comment-widget-component-emoji-picker-rgb-color: 238, 243, 248;
          --halo-comment-widget-component-emoji-picker-rgb-accent: 123, 144, 191;
          --halo-comment-widget-component-emoji-picker-rgb-background: 0, 0, 0;
          --halo-comment-widget-component-emoji-picker-rgb-input: 24, 29, 34;
          --halo-comment-widget-component-emoji-picker-color-border: rgba(255, 255, 255, 0.1);
          --halo-comment-widget-component-emoji-picker-color-border-over: rgba(255, 255, 255, 0.2);


      }
      [# th:if="${theme.config.basic.enable_background_light} and ${theme.config.basic.background_light_mode != ''}"]
      html[data-mode="light"] body {
        background-repeat: no-repeat;
        background-size: cover;
        position: relative;
      }

      html[data-mode="light"] body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("[[${theme.config.basic.background_light_mode}]]");
        background-position: top center;
        background-size: cover;
        background-repeat: no-repeat;
        z-index: -1; /* 保证内容层在背景之上 */
      }

      [/]
      [# th:if="${theme.config.basic.enable_background_light != true} or ${theme.config.basic.background_light_mode == ''} or ${theme.config.basic.background_light_mode == null}"]
      html[data-mode="dark"] body {
        background-repeat: no-repeat;
        background-size: cover;
        position: relative;
      }

      html[data-mode="dark"] body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("[[${theme.config.basic.background_dark_mode}]]");
        background-position: top center;
        background-size: cover;
        background-repeat: no-repeat;
        z-index: -1; /* 保证内容层在背景之上 */
      }

      [/]
      [# th:if="${theme.config.basic.enable_background_dark != true} or ${theme.config.basic.background_dark_mode == ''} or ${theme.config.basic.background_dark_mode == null}"]
      html[data-mode="dark"] body {
          background-image: none;
      }
      [/]
    </style>
  </th:block>
</html>
